<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👻 お菊の 順番皿守り 👻</title>
<style>
  body { margin:0; overflow:hidden; background:linear-gradient(#0d1b2a, #1b263b, #2a1a4a); font-family:sans-serif; color:white; }
  #game { position:relative; width:100vw; height:100vh; }
  #ui { position:absolute; top:10px; left:10px; z-index:100; text-shadow:0 0 8px #ff99ff; font-size:22px; }
  #next { font-size:38px; color:#ffcc00; font-weight:bold; text-shadow:0 0 15px #ff66aa; }

  #ghost {
    position:absolute; bottom:60px; left:50%; transform:translateX(-50%);
    font-size:130px; z-index:10; filter:drop-shadow(0 0 25px #ff99ff);
    transition:transform 0.3s;
  }

  .plate {
    position:absolute; font-size:64px; user-select:none;
    text-shadow:0 0 15px #ffdd77; cursor:pointer;
    width:85px; height:85px; display:flex; align-items:center; justify-content:center;
    border-radius:50%; background:rgba(255,220,100,0.25);
    transition: all 0.2s;
  }

  #hearts { font-size:32px; }
</style>
</head>
<body>

<div id="game">
  <div id="ui">
    <div>周回: <span id="round">1</span>　集めた: <span id="score">0</span>/9</div>
    <div id="next">次: 1</div>
    <div id="hearts">❤❤❤</div>
  </div>
  
  <div id="ghost">👻</div>

  <div id="startScreen" style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:200;">
    <h1>👻 お菊の 順番皿守り 👻</h1>
    <p style="font-size:23px;">1→2→3…→9 を順番に！<br>欲しいお皿を逃さないでね</p>
    <button onclick="startGame()" style="font-size:28px;padding:18px 50px;background:#ff66aa;border:none;border-radius:999px;color:white;margin-top:30px;cursor:pointer;">スタート</button>
  </div>

  <div id="gameOverScreen" style="display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);flex-direction:column;justify-content:center;align-items:center;z-index:200;color:#ff99ff;">
    <h1 id="resultTitle">💦 一枚足りなぁぁい…</h1>
    <p id="finalScore" style="font-size:32px;"></p>
    <button onclick="restartGame()" style="font-size:24px;padding:15px 40px;background:#ff99cc;border:none;border-radius:15px;color:white;cursor:pointer;">もう一度遊ぶ</button>
  </div>
</div>

<script>
let nextNumber = 1;
let score = 0;
let round = 1;
let life = 3;
let anger = 0;
let gameOverFlag = true;
let speedMultiplier = 1;

const game = document.getElementById("game");
const ghost = document.getElementById("ghost");
const scoreEl = document.getElementById("score");
const roundEl = document.getElementById("round");
const nextEl = document.getElementById("next");
const heartsEl = document.getElementById("hearts");

function updateUI() {
  scoreEl.textContent = score;
  roundEl.textContent = round;
  nextEl.textContent = `次: ${nextNumber}`;
  
  let hearts = "❤".repeat(life) + "♡".repeat(3 - life);
  heartsEl.textContent = hearts;
}

function getNextPlateNumber() {
  if (Math.random() < 0.68) return nextNumber;
  if (Math.random() < 0.6) return Math.max(1, nextNumber - 1 + Math.floor(Math.random() * 3));
  return Math.floor(Math.random() * 9) + 1;
}

function createPlate() {
  if (gameOverFlag) return;

  const plate = document.createElement("div");
  plate.className = "plate";
  
  const num = getNextPlateNumber();
  plate.textContent = num;
  plate.dataset.number = num;

  let x = Math.random() * (window.innerWidth - 110);
  let y = -90;
  plate.style.left = `${x}px`;
  plate.style.top = `${y}px`;
  plate.style.transform = `rotate(${Math.random()*40-20}deg)`;

  if (num === nextNumber) {
    plate.style.boxShadow = "0 0 30px gold";
    plate.style.background = "rgba(255,240,100,0.4)";
  }

  game.appendChild(plate);

  let speed = (2.4 + Math.random() * 1.6) * speedMultiplier;

  const fall = setInterval(() => {
    y += speed;
    plate.style.top = `${y}px`;

    if (y > window.innerHeight - 160) {
      clearInterval(fall);
      const num = parseInt(plate.dataset.number);
      plate.remove();

      if (num === nextNumber) {
        missPlate();
      }
    }
  }, 16);

  plate.addEventListener("pointerdown", () => {
    if (gameOverFlag) return;

    const tapped = parseInt(plate.dataset.number);

    if (tapped === nextNumber) {
      score++;
      nextNumber = nextNumber >= 9 ? 1 : nextNumber + 1;

      plate.style.transition = "all 0.3s";
      plate.style.transform = "scale(2.2) rotate(45deg)";
      plate.style.opacity = "0";
      setTimeout(() => plate.remove(), 300);

      ghost.style.transform = "translateX(-50%) scale(1.28)";
      setTimeout(() => ghost.style.transform = "translateX(-50%)", 220);

      if (score % 9 === 0) {
        specialNinth();   // 9枚目専用演出
        levelUp();        // その後にレベルアップ
      }
    } else {
      plate.style.background = "rgba(255,80,80,0.9)";
      plate.style.transform = "scale(0.7)";
      setTimeout(() => plate.remove(), 250);

      anger++;
      ghost.style.transform = "translateX(-50%) scale(0.85)";
      setTimeout(() => ghost.style.transform = "translateX(-50%)", 400);

      if (anger >= 3) {
        missPlate();
        anger = 0;
      }
    }
    updateUI();
  });
}

function missPlate() {
  life--;
  anger = 0;
  ghost.style.transform = "translateX(-50%) scale(0.7)";
  setTimeout(() => ghost.style.transform = "translateX(-50%)", 400);
  updateUI();
  if (life <= 0) endGame();
}

function levelUp() {
  round++;
  speedMultiplier += 0.4;
  score = 0;
  nextNumber = 1;
  updateUI();
}

function specialNinth() {
  setTimeout(() => {
    document.body.style.transition = "background 1.2s";
    document.body.style.background = "#0a0014";
    
    ghost.style.fontSize = "170px";
    
    setTimeout(() => {
      ghost.innerHTML = "九枚……";
      ghost.style.fontSize = "52px";
      ghost.style.color = "#ff99ff";
    }, 700);

    setTimeout(() => {
      ghost.innerHTML = "あれ？";
    }, 1900);

    setTimeout(() => {
      ghost.innerHTML = "一枚足りないぃぃぃ！！";
      ghost.style.fontSize = "56px";
      speedMultiplier += 1.3; // 超高速化
    }, 3000);
  }, 300);
}

let spawnTimer;
function startSpawning() {
  if (spawnTimer) clearInterval(spawnTimer);
  spawnTimer = setInterval(() => {
    createPlate();
    if (Math.random() < 0.28) setTimeout(createPlate, 280);
  }, 760);
}

function startGame() {
  document.getElementById("startScreen").style.display = "none";
  nextNumber = 1; score = 0; round = 1; life = 3; anger = 0;
  speedMultiplier = 1;
  gameOverFlag = false;
  ghost.textContent = "👻";
  ghost.style.fontSize = "130px";
  document.body.style.background = "";
  updateUI();
  startSpawning();
}

function endGame() {
  gameOverFlag = true;
  clearInterval(spawnTimer);
  document.getElementById("resultTitle").textContent = "💦 一枚足りなぁぁい…";
  document.getElementById("finalScore").innerHTML = `周回 ${round-1} まで到達<br>合計 ${ (round-1)*9 + score } 枚`;
  document.getElementById("gameOverScreen").style.display = "flex";
}

function restartGame() {
  document.getElementById("gameOverScreen").style.display = "none";
  startGame();
}

updateUI();
</script>
</body>
</html>
