<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>👻有馬幽霊の皿数え</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Hina+Mincho&family=Sawarabi+Mincho&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    overflow: hidden;
    background: #050515; /* より深い闇夜の青黒 */
    font-family: 'Hina Mincho', 'Sawarabi Mincho', serif;
    color: white;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── 背景 ── */
  #bg {
    position: fixed; inset: 0; z-index: 0;
    background-image: url("bg.png");
    background-size: cover;
    background-position: center top;
    background-color: #050515;
  }
  /* 障子格子オーバーレイ（青紫に映えるよう、少し寒色寄りに変更） */
  #bg::before {
    content: '';
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg,   transparent 0px, transparent 58px,  rgba(180,200,255,0.03) 58px,  rgba(180,200,255,0.03) 60px),
      repeating-linear-gradient(90deg,  transparent 0px, transparent 118px, rgba(180,200,255,0.02) 118px, rgba(180,200,255,0.02) 120px);
    pointer-events: none;
  }

  /* ── ゲームコンテナ ── */
  #game { position: relative; width: 100vw; height: 100vh; z-index: 1; }

  /* ── UI ── */
  #ui {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 12px 16px 8px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
    z-index: 100;
    display: flex; align-items: flex-start; justify-content: space-between;
  }
  #ui-left { display: flex; flex-direction: column; gap: 4px; }
  #ui-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .ui-label { font-size: 13px; color: rgba(180,200,255,0.7); letter-spacing: 0.1em; } /* 暖色から青紫系へ */
  #round-val { font-size: 20px; color: #88ccff; text-shadow: 0 0 8px #3399ff; } /* オレンジから青へ */
  #score-val { font-size: 20px; color: #88ccff; } /* オレンジから青へ */
  #next-wrap {
    text-align: center; padding: 6px 18px;
    background: rgba(150,180,255,0.12); /* ピンクから薄い青紫へ */
    border: 1px solid rgba(150,180,255,0.35);
    border-radius: 10px;
  }
  #next-label { font-size: 12px; color: rgba(180,200,255,0.7); letter-spacing: 0.15em; }
  #next-num {
    font-size: 46px; line-height: 1; color: #e0f0ff;
    text-shadow: 0 0 20px #66aaff, 0 0 40px #3388ff; /* ピンクから青のネオンへ */
    font-weight: bold;
  }
  #hearts { font-size: 26px; letter-spacing: 4px; color: #9966ff; } /* 命の灯火を妖しい紫に */
  #combo-wrap {
    font-size: 13px; color: #55ffdd; /* 黄色からシアン（青緑）へ */
    text-shadow: 0 0 8px #00aaff;
    min-height: 18px; text-align: right;
  }

  /* ── お菊ちゃん ── */
  #ghost-wrap {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
  }
  #ghost-img {
    width: min(220px, 38vw);
    filter: drop-shadow(0 0 20px rgba(140,180,255,0.6)); /* 紫がかった妖光 */
    display: block;
  }
  #ghost-emoji {
    font-size: clamp(80px, 18vw, 140px);
    display: none;
    filter: drop-shadow(0 0 20px #88ccff);
  }

  /* ── お皿 ── */
  .plate {
    position: absolute; cursor: pointer; touch-action: none; z-index: 20;
    transition: opacity 0.22s, transform 0.22s;
  }
  .plate-inner {
    position: relative; width: 80px; height: 80px;
    display: flex; align-items: center; justify-content: center;
  }
  .plate-img { width: 80px; height: 80px; object-fit: contain; }
  .plate-emoji { font-size: 58px; display: none; }
  .plate-num {
    position: absolute;
    font-size: 26px; font-weight: bold; color: #001a3a; /* 茶色から深い紺色へ */
    text-shadow: 1px 1px 0 rgba(100,200,255,0.8);
    pointer-events: none;
  }
  .plate.target .plate-inner {
    animation: targetPulse 0.9s ease-in-out infinite alternate;
  }
  /* ターゲット皿の光彩をゴールドから妖しい青紫へ */
  @keyframes targetPulse {
    from { filter: drop-shadow(0 0 10px #00ffff); }
    to   { filter: drop-shadow(0 0 24px #55eeff) drop-shadow(0 0 8px #0099ff); }
  }

  /* ── エフェクト ── */
  .effect {
    position: absolute; pointer-events: none; z-index: 50;
    font-size: 28px; font-weight: bold;
    animation: effectFly 0.75s ease-out forwards;
  }
  @keyframes effectFly {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-70px) scale(1.4); }
  }
  .effect.good  { color: #55eeff; text-shadow: 0 0 12px #0099ff; } /* 黄からシアンへ */
  .effect.bad   { color: #ff66aa; text-shadow: 0 0 10px #ff0055; } /* 赤から禍々しいピンク赤へ */
  .effect.combo { color: #cc99ff; text-shadow: 0 0 12px #9900ff; font-size: 34px; } /* 紫を強調 */

  /* ── 九枚オーバーレイ ── */
  #ninth-overlay {
    display: none; position: fixed; inset: 0; z-index: 300;
    background: rgba(5,5,15,0.95); /* 真っ黒から深い藍色の闇へ */
    flex-direction: column; justify-content: center; align-items: center; gap: 16px;
  }
  #ninth-overlay.show { display: flex; }
  #ninth-text {
    font-size: clamp(28px, 7vw, 52px); color: #99ccff;
    text-shadow: 0 0 30px #3300ff; text-align: center; line-height: 1.6;
  }

  /* ── オーバーレイ共通 ── */
  .overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(5,5,15,0.93);
    flex-direction: column; justify-content: center; align-items: center;
    gap: 20px; padding: 24px; text-align: center;
  }
  .overlay.show { display: flex; }
  .overlay h1 { font-size: clamp(22px, 5vw, 42px); color: #aaccff; text-shadow: 0 0 20px #33aaff; } /* タイトルを青く */
  .overlay p  { font-size: clamp(15px, 3.5vw, 22px); color: rgba(200,220,255,0.85); line-height: 1.7; }
  .btn {
    font-family: inherit; font-size: clamp(18px, 4vw, 24px);
    padding: 14px 44px;
    background: linear-gradient(135deg, #333399, #6666ff); /* ボタンをピンクから深みのある青紫グラデに */
    border: none; border-radius: 999px; color: white; cursor: pointer;
    box-shadow: 0 0 24px rgba(100,100,255,0.5); letter-spacing: 0.08em;
    transition: transform 0.15s;
  }
  .btn:active { transform: scale(0.95); }

  /* ── ミスフラッシュ ── */
  #miss-flash {
    position: fixed; inset: 0; z-index: 150;
    background: rgba(0,0,255,0.15); pointer-events: none; /* ダメージの瞬間を赤から「ゾクッとする青」に */
    opacity: 0; transition: opacity 0.08s;
  }
  #miss-flash.active { opacity: 1; }

  /* ── 進捗バー ── */
  #progress-wrap {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 5px; background: rgba(255,255,255,0.08); z-index: 100;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #6666ff, #00ffff); /* ピンク黄から紫・シアンのグラデへ */
    transition: width 0.3s ease; box-shadow: 0 0 8px #6666ff;
  }

  /* ── ミュートボタン ── */
  #mute-btn {
    position: fixed; top: 12px; right: 12px; z-index: 300;
    font-size: 22px; background: none; border: none; cursor: pointer; opacity: 0.7;
    display: none;
  }
</style>
</head>
<body>

<audio id="audio-bgm"   src="bgm.mp3"       loop preload="auto"></audio>
<audio id="audio-good"  src="sfx_good.mp3"       preload="auto"></audio>
<audio id="audio-bad"   src="sfx_bad.mp3"        preload="auto"></audio>
<audio id="audio-ninth" src="sfx_ninth.mp3"      preload="auto"></audio>

<div id="bg"></div>
<div id="game">

  <div id="ui">
    <div id="ui-left">
      <span class="ui-label">周回</span>
      <span id="round-val">1</span>
      <span class="ui-label" style="margin-top:4px">枚数</span>
      <span id="score-val">0/9</span>
    </div>
    <div id="next-wrap">
      <div id="next-label">次のお皿</div>
      <div id="next-num">1</div>
    </div>
    <div id="ui-right">
      <div id="hearts">❤❤庫</div> <div id="combo-wrap"></div>
    </div>
  </div>

  <div id="ghost-wrap">
    <img id="ghost-img" src="okiku_normal.png" alt="お菊"
      onerror="this.style.display='none'; document.getElementById('ghost-emoji').style.display='block';">
    <div id="ghost-emoji">👻</div>
  </div>

  <div id="miss-flash"></div>
  <div id="progress-wrap"><div id="progress-bar" style="width:0%"></div></div>
  <button id="mute-btn" onclick="toggleMute()">🔊</button>

  <div class="overlay show" id="startScreen">
    <h1> 有馬幽霊の<br>順番皿数え</h1>
    <p>
      1 → 2 → 3 … → 9 の順番に<br>
      落ちてくるお皿をタップしてください<br><br>
      <span style="color:#aaccff;font-size:0.85em">間違えたり、逃したりすると❤が減ります</span>
    </p>
    <button class="btn" onclick="startGame()">は じ め る</button>
  </div>

  <div class="overlay" id="gameOverScreen">
    <h1 id="resultTitle">一枚足りなぁぁい…</h1>
    <p id="finalScore"></p>
    <button class="btn" onclick="restartGame()">もう一度</button>
  </div>

  <div id="ninth-overlay">
    <div id="ninth-text"></div>
  </div>

</div>

<script>
/* ── STATE ── */
let nextNumber = 1, score = 0, totalScore = 0;
let round = 1, life = 3, anger = 0, combo = 0;
let gameOverFlag = true, speedMultiplier = 1, spawnTimer = null;
let isMuted = false;

/* ── DOM ── */
const game        = document.getElementById("game");
const ghostImg    = document.getElementById("ghost-img");
const ghostEmoji  = document.getElementById("ghost-emoji");
const scoreEl     = document.getElementById("score-val");
const roundEl     = document.getElementById("round-val");
const nextNumEl   = document.getElementById("next-num");
const heartsEl    = document.getElementById("hearts");
const comboEl     = document.getElementById("combo-wrap");
const progressBar = document.getElementById("progress-bar");
const missFlash   = document.getElementById("miss-flash");
const ninthOverlay = document.getElementById("ninth-overlay");
const ninthText   = document.getElementById("ninth-text");

const SND = {
  bgm:   document.getElementById("audio-bgm"),
  good:  document.getElementById("audio-good"),
  bad:   document.getElementById("audio-bad"),
  ninth: document.getElementById("audio-ninth"),
};

function playBGM() {
  SND.bgm.currentTime = 0;
  SND.bgm.volume = 0.6;
  SND.bgm.play().catch(() => {});
}
function stopBGM() {
  SND.bgm.pause();
  SND.bgm.currentTime = 0;
}
function playSFX(key) {
  if (isMuted) return;
  const s = SND[key];
  if (!s) return;
  s.currentTime = 0;
  s.volume = key === "bgm" ? 0.6 : 0.85;
  s.play().catch(() => {});
}

function toggleMute() {
  isMuted = !isMuted;
  SND.bgm.volume = isMuted ? 0 : 0.6;
  document.getElementById("mute-btn").textContent = isMuted ? "🔇" : "🔊";
}

const FACES = {
  normal: "okiku_normal.png",
  smile:  "okiku_smile.png",
  angry:  "okiku_angry.png",
  sad:    "okiku_sad.png",
};
const FACE_EMOJI = { normal:"👻", smile:"😄", angry:"😠", sad:"😢" };

function setFace(face) {
  if (ghostImg.style.display !== "none") {
    ghostImg.src = FACES[face] || FACES.normal;
  } else {
    ghostEmoji.textContent = FACE_EMOJI[face] || "👻";
  }
}
function ghostBounce(scale = 1.22) {
  const wrap = document.getElementById("ghost-wrap");
  wrap.style.transform = `translateX(-50%) scale(${scale})`;
  setTimeout(() => { wrap.style.transform = "translateX(-50%) scale(1)"; }, 220);
}

function updateUI() {
  scoreEl.textContent = `${score}/9`;
  roundEl.textContent = round;
  nextNumEl.textContent = nextNumber;
  heartsEl.textContent = "❤".repeat(life) + "♡".repeat(Math.max(0, 3 - life));
  progressBar.style.width = `${(score / 9) * 100}%`;
  comboEl.textContent = combo >= 3 ? `🔥 ${combo} コンボ！` : "";
}

function showEffect(text, x, y, type) {
  const el = document.createElement("div");
  el.className = `effect ${type}`;
  el.textContent = text;
  el.style.left = `${x}px`;
  el.style.top  = `${y}px`;
  game.appendChild(el);
  setTimeout(() => el.remove(), 750);
}

function getPlateNumber() {
  const r = Math.random();
  if (r < 0.62) return nextNumber;
  if (r < 0.82) return Math.max(1, Math.min(9, nextNumber + Math.floor(Math.random() * 3) - 1));
  return Math.floor(Math.random() * 9) + 1;
}

function createPlate() {
  if (gameOverFlag) return;

  const plate = document.createElement("div");
  plate.className = "plate";
  const num = getPlateNumber();
  plate.dataset.number = num;
  if (num === nextNumber) plate.classList.add("target");

  const inner = document.createElement("div");
  inner.className = "plate-inner";

  const img = document.createElement("img");
  img.className = "plate-img";
  img.src = "plate.png";
  const emoji = document.createElement("div");
  emoji.className = "plate-emoji";
  emoji.textContent = "🍽️";
  img.onerror = () => { img.style.display = "none"; emoji.style.display = "block"; };

  const numEl = document.createElement("div");
  numEl.className = "plate-num";
  numEl.textContent = num;

  inner.append(img, emoji, numEl);
  plate.appendChild(inner);

  const margin = 90;
  const x = margin + Math.random() * (window.innerWidth - margin * 2 - 80);
  let y = -95;
  plate.style.left = `${x}px`;
  plate.style.top  = `${y}px`;
  plate.style.transform = `rotate(${Math.random() * 30 - 15}deg)`;
  game.appendChild(plate);

  const speed = (2.2 + Math.random() * 1.8) * speedMultiplier;
  const fallId = setInterval(() => {
    y += speed;
    plate.style.top = `${y}px`;
    if (y > window.innerHeight - 100) {
      clearInterval(fallId);
      if (!plate.dataset.tapped && parseInt(plate.dataset.number) === nextNumber) {
        missPlate(x + 40, window.innerHeight - 110);
      }
      plate.remove();
    }
  }, 16);
  plate.dataset.fallId = fallId;

  plate.addEventListener("pointerdown", () => {
    if (gameOverFlag || plate.dataset.tapped) return;
    plate.dataset.tapped = "1";
    clearInterval(parseInt(plate.dataset.fallId));

    const tapped = parseInt(plate.dataset.number);
    const px = parseFloat(plate.style.left);
    const py = parseFloat(plate.style.top);

    if (tapped === nextNumber) {
      score++; totalScore++; combo++;
      nextNumber = nextNumber >= 9 ? 1 : nextNumber + 1;
      anger = 0;

      playSFX("good");
      const txt = combo >= 5 ? `✨ ${combo} COMBO!` : combo >= 3 ? `🔥 ${combo} コンボ` : "よし！";
      showEffect(txt, px, py, combo >= 3 ? "combo" : "good");

      plate.style.transition = "all 0.28s ease";
      plate.style.transform  = "scale(2) rotate(30deg)";
      plate.style.opacity    = "0";
      setTimeout(() => plate.remove(), 300);

      setFace("smile"); ghostBounce(1.2);
      setTimeout(() => setFace("normal"), 600);
      updateUI();
      if (score >= 9) triggerNinthScene();

    } else {
      combo = 0; anger++;
      playSFX("bad");
      showEffect("……ちがう！", px, py - 10, "bad");
      plate.style.transition = "all 0.22s";
      plate.style.transform  = "scale(0.6) rotate(-20deg)";
      plate.style.opacity    = "0";
      setTimeout(() => plate.remove(), 250);

      setFace("angry"); ghostBounce(0.85);
      setTimeout(() => setFace("normal"), 700);
      updateUI();
      if (anger >= 3) { anger = 0; missPlate(px + 40, py + 40); }
    }
  });
}

function missPlate(x = window.innerWidth / 2, y = window.innerHeight / 2) {
  life--; combo = 0;
  playSFX("bad");
  missFlash.classList.add("active");
  setTimeout(() => missFlash.classList.remove("active"), 180);
  setFace("sad"); ghostBounce(0.75);
  setTimeout(() => setFace("normal"), 800);
  showEffect("……！", x - 40, y, "bad");
  updateUI();
  if (life <= 0) endGame();
}

function triggerNinthScene() {
  gameOverFlag = true;
  clearInterval(spawnTimer);
  document.querySelectorAll(".plate").forEach(p => p.remove());

  playSFX("ninth");
  setFace("angry");

  const lines  = ["一枚……","二枚……","三枚……四枚……","五枚……六枚……","七枚……八枚……","九枚……","……あれ？","一枚足りないぃぃぃ！！！"];
  const delays = [600, 600, 700, 800, 900, 1000, 1400, 200];

  ninthOverlay.classList.add("show");
  let idx = 0;
  function showLine() {
    if (idx >= lines.length) {
      setTimeout(() => { ninthOverlay.classList.remove("show"); levelUp(); }, 1200);
      return;
    }
    ninthText.innerHTML = lines[idx];
    idx++;
    setTimeout(showLine, delays[idx - 1] || 700);
  }
  setTimeout(showLine, 400);
}

function levelUp() {
  round++; score = 0; nextNumber = 1; anger = 0; combo = 0;
  speedMultiplier += 0.35;
  setFace("normal");
  gameOverFlag = false;
  updateUI();
  startSpawning();
}

function startSpawning() {
  if (spawnTimer) clearInterval(spawnTimer);
  const interval = Math.max(420, 760 - (round - 1) * 30);
  spawnTimer = setInterval(() => {
    if (gameOverFlag) return;
    createPlate();
    if (Math.random() < 0.25 + (round - 1) * 0.04) setTimeout(createPlate, 270);
  }, interval);
}

function startGame() {
  document.getElementById("startScreen").classList.remove("show");
  document.getElementById("mute-btn").style.display = "block";

  nextNumber = 1; score = 0; totalScore = 0;
  round = 1; life = 3; anger = 0; combo = 0;
  speedMultiplier = 1; gameOverFlag = false;

  setFace("normal");
  updateUI();
  playBGM();
  startSpawning();
}

function endGame() {
  gameOverFlag = true;
  clearInterval(spawnTimer);
  stopBGM();
  document.querySelectorAll(".plate").forEach(p => p.remove());

  setFace("sad");
  playSFX("bad");

  document.getElementById("resultTitle").textContent = "帰る……";
  document.getElementById("finalScore").innerHTML =
    `周回 <strong>${Math.max(0, round - 1)}</strong> 完了<br>合計 <strong>${totalScore}</strong> 枚のお皿を守ったよ！`;
  document.getElementById("gameOverScreen").classList.add("show");
}

function restartGame() {
  document.getElementById("gameOverScreen").classList.remove("show");
  startGame();
}

updateUI();
</script>
</body>
</html>
